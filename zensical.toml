[project]

site_name = "Myriad"
site_description = "Myriad is an open-source project."
site_author = "Standard-2"
site_url = "https://standard-2.github.io/Myriad/"

copyright = """
Copyright &copy; 2026 Standard-2
"""

# Repository
repo_url = "https://github.com/Standard-2/Myriad"
repo_name = "Standard-2/Myriad"
edit_uri = "edit/main/docs/"

# https://zensical.org/docs/setup/navigation/
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    "getting-started/index.md",
    "getting-started/building-from-source.md",
  ] },
  { "API" = [
    "api/index.md",
    { "Standards" = [
      "api/standards/index.md",
      "api/standards/checks.md",
    ] },
  ] },
  { "Specification" = [
    "spec/index.md",
    { "File Dialog" = [
      "spec/File Dialog/index.md",
      { "Types" = [
        "spec/File Dialog/Types/index.md",
        "spec/File Dialog/Types/dialogItem.md",
        "spec/File Dialog/Types/dialogOptions.md",
        "spec/File Dialog/Types/file.md",
        "spec/File Dialog/Types/fileDialogOptions.md",
        "spec/File Dialog/Types/folder.md",
        "spec/File Dialog/Types/item.md",
        "spec/File Dialog/Types/saveDialogOptions.md",
      ] },
      { "openfiledialog" = [
        "spec/File Dialog/openfiledialog/index.md",
      ] },
      { "openfilesdialog" = [
        "spec/File Dialog/openfilesdialog/index.md",
      ] },
      { "openfolderdialog" = [
        "spec/File Dialog/openfolderdialog/index.md",
      ] },
      { "savefiledialog" = [
        "spec/File Dialog/savefiledialog/index.md",
      ] },
    ] },
    { "(Unstable) InputCapture" = [
        "spec/InputCapture/index.md",
        "spec/InputCapture/InputDescriptor.md",
        "spec/InputCapture/Keyboard.md",
        "spec/InputCapture/Mouse.md",
        { "new" = [
          "spec/InputCapture/new/index.md",
          "spec/InputCapture/new/InputListener.md",
        ] }
      ] },
  ] }
]

[project.theme]

language = "en"

features = [
  "announce.dismiss",

  # https://zensical.org/docs/setup/repository/#code-actions
  "content.action.edit",
  "content.action.view",

  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",

  # https://zensical.org/docs/setup/header/#automatic-hiding
  "header.autohide",

  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.footer",
  "navigation.expand",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

logo = "public/logo.svg"
favicon = "public/favicon.ico"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[project.extra]
# https://zensical.org/docs/setup/footer/#generator-notice
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Standard-2/Myriad"
